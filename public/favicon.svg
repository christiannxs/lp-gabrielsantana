<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pulseBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="pulseAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#pulseBg)" />

  <!-- Anel suave para dar profundidade -->
  <circle
    cx="32"
    cy="32"
    r="22"
    fill="none"
    stroke="rgba(148, 163, 184, 0.35)"
    stroke-width="2.2"
  />

  <!-- Pulso em forma de P estilizado -->
  <path
    d="M23 20v24
       M23 22h10a7 7 0 0 1 0 14h-6"
    fill="none"
    stroke="url(#pulseAccent)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Traço de pulso digital atravessando o P -->
  <path
    d="M18 32h4l2-4 3 8 3-6 2 4h12"
    fill="none"
    stroke="#a5b4fc"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Pontos de energia -->
  <circle cx="20" cy="32" r="1.4" fill="#38bdf8" />
  <circle cx="44" cy="32" r="1.4" fill="#38bdf8" />
</svg>

